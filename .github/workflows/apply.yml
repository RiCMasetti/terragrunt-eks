name: Apply

on:
  push:
    branches: [main]

permissions:
  id-token: write   # OIDC token for AWS authentication
  contents: write   # Flux bootstrap commits cluster manifests back to the repo

jobs:
  apply:
    name: Terragrunt Apply + Flux Bootstrap
    runs-on: ubuntu-latest
    # Manual approval gate — configure required reviewers on the "production"
    # environment in: Settings → Environments → production → Protection rules
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Set up Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v0.67.0/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt && chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt apply
        working-directory: live/eks
        run: terragrunt run-all apply --terragrunt-non-interactive
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          TF_VAR_cluster_name: ${{ vars.CLUSTER_NAME }}
          TF_VAR_kubernetes_version: ${{ vars.KUBERNETES_VERSION }}
          # Must be a JSON array, e.g. ["t3.medium"] — set the GitHub variable accordingly
          TF_VAR_instance_types: ${{ vars.INSTANCE_TYPES }}
          TF_VAR_node_min_size: ${{ vars.NODE_MIN_SIZE }}
          TF_VAR_node_max_size: ${{ vars.NODE_MAX_SIZE }}
          TF_VAR_node_desired_size: ${{ vars.NODE_DESIRED_SIZE }}
          TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
          TF_VAR_single_nat_gateway: ${{ vars.SINGLE_NAT_GATEWAY }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
          TF_VAR_route53_zone_id: ${{ vars.ROUTE53_ZONE_ID }}
          TF_VAR_github_org: ${{ vars.GITHUB_ORG }}
          TF_VAR_github_repo: ${{ vars.GITHUB_REPO }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ vars.CLUSTER_NAME }}" \
            --region "${{ vars.AWS_DEFAULT_REGION }}"

      - name: Install Flux CLI
        run: |
          curl -s https://fluxcd.io/install.sh | bash

      - name: Flux bootstrap
        # Idempotent — safe to run on every apply.
        # Flux writes its own manifests to gitops/clusters/production/flux-system/
        # and commits them back; the workflow needs contents: write for this.
        run: |
          flux bootstrap github \
            --owner="${{ vars.GITHUB_ORG }}" \
            --repository="${{ vars.GITHUB_REPO }}" \
            --branch=main \
            --path="gitops/clusters/production" \
            --personal=false \
            --token-auth=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
